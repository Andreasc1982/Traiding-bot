<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DEX-Monitor — Solana Watchlist</title>
<style>
  :root { --bg:#0e1116; --card:#171c24; --line:#262d38; --txt:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --gold:#d4a017; --blue:#58a6ff; --yellow:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { padding:18px 22px; border-bottom:1px solid var(--line); display:flex;
           align-items:baseline; gap:14px; flex-wrap:wrap; }
  h1 { font-size:20px; margin:0; }
  .sub { color:var(--dim); font-size:13px; }
  .stats { margin-left:auto; display:flex; gap:18px; font-size:13px; }
  .stat b { color:var(--blue); font-size:16px; }
  .stat span { color:var(--dim); }
  .wrap { padding:18px 22px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--dim); font-weight:500; font-size:11px;
       text-transform:uppercase; letter-spacing:.5px; padding:8px 10px;
       border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  td { padding:9px 10px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  tr:hover td { background:#1b212b; }
  .sym { color:var(--blue); font-weight:600; }
  .pos { color:var(--green); } .neg { color:var(--red); } .dim { color:var(--dim); }
  .pill { padding:2px 8px; border-radius:10px; font-size:11px; }
  .pill.ok { background:rgba(63,185,80,.15); color:var(--green); }
  .pill.warn { background:rgba(210,153,34,.15); color:var(--yellow); }
  #updated { color:var(--dim); font-size:12px; width:100%; margin-top:2px; }
  .empty { color:var(--dim); padding:30px; text-align:center; font-style:italic; }
</style>
</head>
<body>
<header>
  <h1>🛰️ DEX-Monitor</h1>
  <span class="sub">Solana · Token-Discovery + Scam-Screening · read-only (kein Geld)</span>
  <div class="stats" id="stats"></div>
  <div id="updated">lädt…</div>
</header>
<div class="wrap">
  <table>
    <thead><tr>
      <th>Symbol</th><th>Preis</th><th>seit Entdeckung</th><th>Mom. 5m</th>
      <th>Liquidität</th><th>Buy/Sell</th><th>Rug</th><th>Alter</th><th>entdeckt</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">Noch keine Token auf der Watchlist — Screening läuft…</div>
</div>

<script>
function fmtPrice(p){
  const n = parseFloat(p);
  if (!isFinite(n) || n === 0) return "–";
  if (n >= 1) return "$" + n.toLocaleString("de-DE",{maximumFractionDigits:4});
  return "$" + n.toPrecision(3);   // Micro-Preise: 3 signifikante Stellen
}
function fmtUsd(n){ return "$" + (n||0).toLocaleString("de-DE",{maximumFractionDigits:0}); }

async function load(){
  let wl = {}, hb = {};
  try { wl = await (await fetch("watchlist.json?_="+Date.now())).json(); } catch(e){}
  try { hb = await (await fetch("heartbeat.json?_="+Date.now())).json(); } catch(e){}

  const rows = Object.values(wl).map(t => {
    const cur = parseFloat(t.price), first = parseFloat(t.first_price || t.price);
    const perf = (isFinite(cur) && isFinite(first) && first > 0) ? (cur-first)/first*100 : 0;
    return {...t, perf};
  }).sort((a,b)=> b.perf - a.perf);

  const tb = document.getElementById("rows");
  tb.innerHTML = "";
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  for (const t of rows){
    const pc = (t.chg5>=0?"pos":"neg"), pf = (t.perf>=0?"pos":"neg");
    const bs = (t.sells>0 && t.buys/t.sells < 1) ? "neg" : "pos";
    const rugCls = (t.rug_risk && t.rug_risk!=="ok" && t.rug_risk!=="?") ? "warn" : "ok";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="sym">${t.symbol||"?"}</td>
      <td>${fmtPrice(t.price)}</td>
      <td class="${pf}">${t.perf>=0?"+":""}${t.perf.toFixed(1)}%</td>
      <td class="${pc}">${t.chg5>=0?"+":""}${t.chg5}%</td>
      <td>${fmtUsd(t.liq)}</td>
      <td class="${bs}">${t.buys}/${t.sells}</td>
      <td><span class="pill ${rugCls}">${t.rug_risk||"?"}</span></td>
      <td class="dim">${t.age_h}h</td>
      <td class="dim">${(t.first_seen||"").slice(5)}</td>`;
    tb.appendChild(tr);
  }

  document.getElementById("stats").innerHTML =
    `<div class="stat"><b>${hb.screened||0}</b> <span>gescreent</span></div>
     <div class="stat"><b>${hb.passed||0}</b> <span>bestanden</span></div>
     <div class="stat"><b>${rows.length}</b> <span>Watchlist</span></div>`;
  const age = hb.ts ? Math.round((Date.now()/1000 - hb.ts)/60) : "?";
  document.getElementById("updated").textContent =
    "Zyklus " + (hb.cycle||"?") + " · letztes Update vor " + age + " min · Auto-Refresh 20s";
}
load();
setInterval(load, 20000);
</script>
</body>
</html>
